<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Form</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 15px;
}

/* Container Responsive */
.form-container {
    background: rgba(255, 255, 255, 0.95);
    padding: 25px 20px;
    border-radius: 16px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    backdrop-filter: blur(10px);
}

/* Heading */
.form-container h2 {
    text-align: center;
    margin-bottom: 20px;
    font-size: 22px;
    color: #333;
}

/* Inputs */
input, textarea {
    width: 100%;
    padding: 14px;
    margin: 8px 0;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 15px;
    box-sizing: border-box;
    transition: 0.3s;
}

/* Focus effect */
input:focus, textarea:focus {
    border-color: #667eea;
    box-shadow: 0 0 8px rgba(102,126,234,0.4);
    outline: none;
}

/* Button */
button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    background: linear-gradient(135deg, #667eea, #5a67d8);
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

/* Messages */
.error {
    color: red;
    font-size: 12px;
}
.success {
    color: green;
    text-align: center;
    margin-top: 10px;
}

/* 🔥 Mobile Optimization */
@media (max-width: 480px) {
    .form-container {
        padding: 20px 15px;
        border-radius: 12px;
    }

    .form-container h2 {
        font-size: 20px;
    }

    input, textarea {
        padding: 12px;
        font-size: 14px;
    }

    button {
        padding: 12px;
        font-size: 15px;
    }
}
</style>
</head>

<body>

    <!-- session -->
<script>
    if (sessionStorage.getItem("query_access") !== "yes") {
        window.location.href = "index.html";
    }
    sessionStorage.removeItem("query_access");
</script>

<div class="form-container">
    <h2>Query Box</h2>

    <input type="text" id="name" placeholder="Enter Name">
    <div class="error" id="nameError"></div>

    <input type="text" id="mobile" placeholder="Enter Mobile Number">
    <div class="error" id="mobileError"></div>

    <textarea id="query" rows="4" placeholder="Enter your query"></textarea>

    <button onclick="submitForm()">Submit</button>

    <div class="success" id="successMsg"></div>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbzk7GlViHn4B-hmC1HmWreajAgQX3e827DogaNkS4qPHDTUZ-Uvzv2dCVfCJDGcQKz1rg/exec";

function validate() {
    let name = document.getElementById("name").value.trim();
    let mobile = document.getElementById("mobile").value.trim();

    let valid = true;

    document.getElementById("nameError").innerText = "";
    document.getElementById("mobileError").innerText = "";

    // Name validation
    if (name.length < 3) {
        document.getElementById("nameError").innerText = "Name must be at least 3 characters";
        valid = false;
    }

    // Mobile validation
    if (!/^[6-9]\d{9}$/.test(mobile)) {
        document.getElementById("mobileError").innerText = "Enter valid 10-digit mobile number";
        valid = false;
    }

    return valid;
}

function submitForm() {
    if (!validate()) return;

    let data = {
        name: document.getElementById("name").value,
        mobile: document.getElementById("mobile").value,
        query: document.getElementById("query").value
    };

    fetch(scriptURL, {
        method: "POST",
        body: JSON.stringify(data)
    })
    .then(res => res.text())
    .then(response => {
        document.getElementById("successMsg").innerText = "Query Send Successfully!";
        
        document.getElementById("name").value = "";
        document.getElementById("mobile").value = "";
        document.getElementById("query").value = "";
    })
    .catch(error => alert("Error!"));
}
</script>

</body>
</html>
