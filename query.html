<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Quary Form</title>

<style>
body {
    font-family: 'Inter', 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #690235, #043aa5);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 15px;
    color: #e4e6eb;
}

/* Container */
.form-container {
    background: rgba(4, 9, 34, 0.85);
    padding: 28px 22px;
    border-radius: 18px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.05);
}

/* Heading */
.form-container h2 {
    text-align: center;
    margin-bottom: 22px;
    font-size: 22px;
    color: #f1f1f1;
    letter-spacing: 0.5px;
}

/* Inputs */
input, textarea {
    width: 100%;
    padding: 14px;
    margin: 10px 0;
    border-radius: 12px;
    border: 1px solid #4b4f5c;
    font-size: 15px;
    box-sizing: border-box;
    background:#343746;;
    color: #fff;
    transition: all 0.25s ease;
}

/* Placeholder */
input::placeholder,
textarea::placeholder {
    color: #9aa0a6;
}

/* Focus */
input:focus, textarea:focus {
    border-color: #7c83ff;
    box-shadow: 0 0 10px rgba(124,131,255,0.3);
    outline: none;
    background: #343746;
}

/* Button */
button {
    width: 100%;
    padding: 14px;
    margin-top: 12px;
    background: linear-gradient(135deg, #7c83ff, #5a61d6);
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.25s ease;
    font-weight: 500;
}

/* Button Hover */
button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.35);
}

/* Button Active */
button:active {
    transform: scale(0.98);
}

/* Messages */
.error {
    color: #ff6b6b;
    font-size: 12px;
}

.success {
    color: #4ade80;
    text-align: center;
    margin-top: 12px;
    font-size: 14px;
}

/* 🔥 Mobile Optimization */
@media (max-width: 480px) {
    .form-container {
        padding: 20px 15px;
        border-radius: 12px;
    }

    .form-container h2 {
        font-size: 20px;
    }

    input, textarea {
        padding: 12px;
        font-size: 14px;
    }

    button {
        padding: 12px;
        font-size: 15px;
    }
}
</style>
</head>

<body>

    <!-- session -->
<script>
    if (sessionStorage.getItem("query_access") !== "yes") {
        window.location.href = "index.html";
    }
    sessionStorage.removeItem("query_access");
</script>

<div class="form-container">
    <h2>Query Box</h2>

    <input type="text" id="name" placeholder="Enter Name">
    <div class="error" id="nameError"></div>

    <input type="text" id="mobile" placeholder="Enter Mobile Number">
    <div class="error" id="mobileError"></div>

    <textarea id="query" rows="4" placeholder="Enter your query"></textarea>

    <button onclick="submitForm()">Submit</button>

    <div class="success" id="successMsg"></div>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbzk7GlViHn4B-hmC1HmWreajAgQX3e827DogaNkS4qPHDTUZ-Uvzv2dCVfCJDGcQKz1rg/exec";

function validate() {
    let name = document.getElementById("name").value.trim();
    let mobile = document.getElementById("mobile").value.trim();

    let valid = true;

    document.getElementById("nameError").innerText = "";
    document.getElementById("mobileError").innerText = "";

    // Name validation
    if (name.length < 3) {
        document.getElementById("nameError").innerText = "Name must be at least 3 characters";
        valid = false;
    }

    // Mobile validation
    if (!/^[6-9]\d{9}$/.test(mobile)) {
        document.getElementById("mobileError").innerText = "Enter valid 10-digit mobile number";
        valid = false;
    }

    return valid;
}

function submitForm() {
    if (!validate()) return;

    let data = {
        name: document.getElementById("name").value,
        mobile: document.getElementById("mobile").value,
        query: document.getElementById("query").value
    };

    fetch(scriptURL, {
        method: "POST",
        body: JSON.stringify(data)
    })
    .then(res => res.text())
    .then(response => {
        document.getElementById("successMsg").innerText = "Query Send Successfully!";
        
        document.getElementById("name").value = "";
        document.getElementById("mobile").value = "";
        document.getElementById("query").value = "";
    })
    .catch(error => alert("Error!"));
}
</script>

</body>
</html>
