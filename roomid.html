<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #141E30, #243B55);
  display: flex;
  flex-direction:column; /* ye line important hai */
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 30px;
  border-radius: 20px;
  backdrop-filter: blur(15px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  width: 320px;
  text-align: center;
  color: white;
}

.card h2 {
  margin-bottom: 10px;
}

.info {
  margin-top: 20px;
  text-align: left;
}

.info p {
  background: rgba(255,255,255,0.1);
  padding: 10px;
  border-radius: 10px;
  margin: 8px 0;
}

/* ------- maorden card -----*/
.modern-card{
display: block;
margin-top: 15px;
width:80%;
padding:18px;
border-radius:22px;

background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);

box-shadow:0 10px 35px rgba(0,0,0,0.4);
transition:0.4s;
}

.modern-card:hover{
transform:translateY(-8px) scale(1.02);
box-shadow:0 20px 50px rgba(0,0,0,0.6);
}

/* Image Box */
.modern-img{
width:100%;
height:180px;
border-radius:18px;
overflow:hidden;
position:relative;
}

/* Gradient Overlay Effect */
.modern-img::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;

background:linear-gradient(180deg,transparent,rgba(0,0,0,0.6));
}

/* Image */
.modern-img img{
width:100%;
height:100%;
object-fit:cover;
display:block;
transition:0.5s;
}

/* Zoom Hover */
.modern-card:hover .modern-img img{
transform:scale(1.1);
}

</style>
</head>

<body>

  <!-- session -->
  <script>
    const allowedRef = document.referrer.includes("bgmit.netlify.app");

    if (!allowedRef && sessionStorage.getItem("allowed") !== "yes") {
        window.location.href = "/";
    }
</script>

<div class="card">
  <h2>👋 Welcome</h2>
  <h3><?= name ?></h3>

  <div class="info">
    <p><b>🏠 Room ID:</b> <?= room ?> 45847</p>
    <p><b>🔑 Password:</b> <?= password ?>gfrdr</p>
  </div>
</div>
<div class="modern-card">

  <div class="modern-img">
    <img src="https://via.placeholder.com/400x200" alt="Banner">
  </div>

</div>

</body>
</html>
