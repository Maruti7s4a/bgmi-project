<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #141E30, #243B55);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  
  /* FIX */
  min-height: 100vh;
  padding: 15px;
}

/* -------- Main Card -------- */
.card {
  background: rgba(255,255,255,0.1);
  padding: 25px;
  border-radius: 20px;
  backdrop-filter: blur(15px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  
  width: 100%;
  max-width: 350px;   /* responsive width */
  
  text-align: center;
  color: white;
}

/* -------- Info Section -------- */
.info {
  margin-top: 20px;
  text-align: left;
}

.info p {
  background: rgba(255,255,255,0.1);
  padding: 10px;
  border-radius: 10px;
  margin: 8px 0;
  font-size: 14px;
}

/* -------- Modern Card -------- */
.modern-card {
  display: block;
  margin-top: 15px;
  
  width: 100%;
  max-width: 500px;   /* control width */
  
  padding: 18px;
  border-radius: 22px;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);

  box-shadow: 0 10px 35px rgba(0,0,0,0.4);
  transition: 0.4s;
}

.modern-card:hover {
  transform: translateY(-8px) scale(1.02);
  box-shadow: 0 20px 50px rgba(0,0,0,0.6);
}

/* -------- Tablet -------- */
@media (max-width: 768px) {
  .card {
    padding: 20px;
  }

  .modern-card {
    padding: 16px;
  }
}

/* -------- Mobile -------- */
@media (max-width: 480px) {
  .card {
    padding: 18px;
    border-radius: 15px;
  }

  .info p {
    font-size: 13px;
    padding: 8px;
  }

  .modern-card {
    padding: 14px;
    border-radius: 18px;
  }
}

/*------------ Image Box ---------*/
/* Container */
.container {
  width: 88%;
  max-width: 420px;
  margin: auto;
  padding: 15px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  text-align: center;
}

/* Image Box */
.image-box {
  width: 100%;
  border-radius: 11px;
  overflow: hidden;
  background: rgba(255,255,255,0.08);
}

/* Image */
.image-box img {
  width: 100%;
  height: auto;   /* ⭐ main fix */
  display: block;
}

/* Button */
.download-btn {
  margin-top: 20px;
  padding: 12px;
  width: 70%;
  border: none;
  border-radius: 08px;
  text-decoration: none;
  background: linear-gradient(135deg, #00c6ff, #0072ff);
  color: white;
  cursor: pointer;
}

/*-------- title section ---------*/

.modern-title {
    width: 92%;
    margin: 20px auto;
    display: flex;
    align-items: center;
    gap: 10px;
}

/* Left Color Bar */
.title-bar {
    width: 5px;
    height: 28px;
    border-radius: 5px;
    background: linear-gradient(180deg, #00c6ff, #0072ff);
    box-shadow: 0 0 8px rgba(0,198,255,0.6);
}

/* Heading Text */
.modern-title h3 {
    font-size: 20px;
    font-weight: 700;
    margin: 0;
    letter-spacing: 0.5px;

    background: linear-gradient(45deg, #00c6ff, #ff9800);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    font-family: 'Poppins', sans-serif;
}
</style>
</head>

<body>

  <!-- session -->
  <script>
    if (sessionStorage.getItem("login_access") !== "yes") {
    window.location.href = "index.html";
  }
  sessionStorage.removeItem("login_access");
  </script>

<div class="card">
  <h2>👋 Welcome</h2>
  <h3><?= name ?></h3>

  <div class="info">
    <p><b>🏠 Room ID:</b> <?= room ?> <span style="font-weight: bold; color: aqua;">45847</span></p>
    <p><b>🔑 Password:</b> <?= password ?><span style="font-weight: bold; color: rgb(8, 255, 160);">jgkhu</span></p>
  </div>
</div>

<div class="modern-title">
    <div class="title-bar"></div>
    <h3>Players Seating Position</h3>
</div>

<div class="container">

  <div class="image-box">
    <img id="myImage" src="images/LIST.png" alt="Image">
  </div>

  <a href="images/LIST.png" download class="download-btn">
    Download
  </a>

</div>

</body>
</html>
